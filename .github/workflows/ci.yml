name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm lint

      - name: Typecheck & build
        run: pnpm build

      - name: Test
        run: pnpm test

  sites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing + docs sites
        run: pnpm build:web

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the server image
        run: docker build -f apps/server/Dockerfile -t rooster-server:ci .

  # SQLite/libSQL is the first-class, CI-tested dialect (the test suite runs on
  # in-memory libSQL, and production is Turso). Fail if the committed SQLite
  # migrations don't match what drizzle-kit would regenerate from sqlite.ts.
  # The Postgres dialect is frozen/community-maintained and intentionally NOT
  # checked here — pg.ts may drift; regenerate db:generate:pg yourself if you
  # care about that path. (pg.ts still typechecks via the `verify` build step.)
  migrations-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate the SQLite dialect
        run: pnpm --filter @rooster/db db:generate:sqlite

      - name: Fail on uncommitted SQLite migration drift
        run: git diff --exit-code packages/db/migrations/sqlite

  # The Cloudflare Worker bundle must stay free of `pg` (Node-only) so it runs
  # on the edge. Build the bundle via a dry-run deploy and assert no pg slipped
  # in (guards the pg-free crow/email/discovery modules).
  worker-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build server
        run: pnpm --filter @rooster/server build

      - name: Bundle the Worker (dry-run, no deploy)
        working-directory: apps/server
        run: pnpm dlx wrangler@4 deploy --dry-run --outdir dist-worker

      - name: Assert the edge bundle is pg-free
        working-directory: apps/server
        # Grep the emitted bundle only, not the .map (source maps embed the
        # original `import pg from 'pg'` text from tree-shaken Node-only modules).
        run: |
          if grep -rEl "require\(['\"]pg['\"]\)|from[[:space:]]*['\"]pg['\"]|node_modules/pg/" dist-worker --include=worker.js; then
            echo "::error::Postgres ('pg') leaked into the Cloudflare Worker bundle"
            exit 1
          fi
          echo "Worker bundle is pg-free ✓"

  # ── Deploy (main only, after every verify job passes) ─────────────────────
  # `needs:` gates these on the verify matrix; the `if` restricts to pushes to
  # main; `environment: production` scopes the secrets and allows branch/approval
  # protection. Configure in the repo's "production" GitHub Environment:
  #   Secrets — CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, DATABASE_URL
  #     (libsql://… Turso), DATABASE_AUTH_TOKEN, ROOSTER_AUTH_SECRET
  #   Variables — CLOUDFLARE_PAGES_PROJECT (the Pages project name)
  # If these aren't set the jobs simply fail at the deploy step; the verify
  # matrix above is unaffected.

  # Deploy the Worker + apply both schema migrations to Turso first so the schema
  # lands with the code: db:migrate (domain tables) then auth:migrate (better-auth
  # tables — its drizzle libSQL adapter is durable on Turso). Both are
  # non-interactive and idempotent.
  deploy-server:
    needs: [verify, migrations-in-sync, worker-bundle]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
      ROOSTER_AUTH_SECRET: ${{ secrets.ROOSTER_AUTH_SECRET }}
      BASE_URL: https://app.airooster.dev
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build server
        run: pnpm --filter @rooster/server build

      # Migrate first so new columns/tables exist before the new code serves.
      - name: Apply domain migrations (Turso)
        run: pnpm --filter @rooster/db db:migrate

      - name: Apply better-auth migrations (Turso)
        run: pnpm --filter @rooster/server auth:migrate

      - name: Deploy Worker
        working-directory: apps/server
        run: pnpm dlx wrangler@4 deploy

      - name: Post-deploy smoke
        run: |
          set -euo pipefail
          echo "Smoke-testing $BASE_URL"
          curl -fsS "$BASE_URL/healthz" | grep -q '"ok":true'
          curl -fsS "$BASE_URL/.well-known/rooster" -o /tmp/disc.json
          # Discovery must advertise the correct base URL (a stale base breaks OAuth/MCP).
          grep -q "$BASE_URL" /tmp/disc.json
          curl -fsS "$BASE_URL/llms.txt" -o /dev/null
          curl -fsS "$BASE_URL/api/auth/.well-known/oauth-authorization-server" -o /dev/null
          curl -fsS "$BASE_URL/api/auth/.well-known/oauth-protected-resource" -o /dev/null
          echo "Post-deploy smoke passed ✓"

  # Deploy the marketing + docs sites (Cloudflare Pages).
  deploy-sites:
    needs: [verify, sites]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing + docs bundle
        run: pnpm build:web

      - name: Deploy to Cloudflare Pages
        run: pnpm dlx wrangler@4 pages deploy dist-web --project-name "${{ vars.CLOUDFLARE_PAGES_PROJECT }}"
